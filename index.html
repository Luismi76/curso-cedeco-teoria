# Cuadernillo del Alumno — UF0861

## Montaje y verificación de componentes (90 h)

**Certificado:** IFCT0309 — Montaje y Reparación de Sistemas Microinformáticos
**Horario:** 09:00 – 14:00 | **Período:** 11/03/2026 – 10/04/2026

> Bienvenido/a a este módulo. A lo largo de las próximas semanas vas a aprender a montar un ordenador desde cero: desde elegir cada pieza hasta encenderlo por primera vez y comprobar que todo funciona. No necesitas experiencia previa, solo ganas de aprender y curiosidad. ¡Vamos allá!

---

# Sesión 1 — Mi 11/03

## Presentación y seguridad eléctrica

### Parte teórica

Antes de tocar un solo tornillo, necesitamos hablar de **seguridad**. Trabajar con componentes electrónicos implica riesgos que podemos evitar fácilmente si conocemos unas reglas básicas.

**¿Por qué es importante la seguridad eléctrica?**

Un ordenador funciona con electricidad. Aunque los voltajes dentro de un PC son bajos (3.3V, 5V, 12V), la **fuente de alimentación** trabaja con los 230V de la red eléctrica, que sí son peligrosos. Además, los componentes internos son muy sensibles a un enemigo invisible: la **electricidad estática**.

**La descarga electrostática (ESD)**

¿Alguna vez has tocado algo metálico y has sentido un «calambrazo»? Eso es una descarga electrostática. Para ti es solo una molestia, pero para un chip o un módulo de memoria puede ser mortal. Una descarga de apenas 100 voltios (que ni siquiera notas) puede dañar un componente de forma irreversible.

**¿Cómo nos protegemos?**

| Medida                          | Para qué sirve                                                                                                                                           |
| ------------------------------- | -------------------------------------------------------------------------------------------------------------------------------------------------------- |
| **Muñequera antiestática**      | Se conecta a una toma de tierra y descarga la electricidad de tu cuerpo de forma continua.                                                               |
| **Alfombrilla antiestática**    | Superficie donde apoyas los componentes mientras trabajas.                                                                                               |
| **Tocar el chasis metálico**    | Alternativa rápida: antes de tocar un componente, toca la carcasa metálica del PC (conectada a la corriente pero apagada) para igualarte a su potencial. |
| **No trabajar sobre alfombras** | Las alfombras y la ropa sintética generan mucha electricidad estática.                                                                                   |

**Equipos de protección individual (EPI)**

En un taller profesional se usan:

- Guantes aislantes (para trabajar con la fuente de alimentación).
- Gafas de protección (al soldar o manipular componentes pequeños).
- Calzado con suela aislante.

**Regla de oro:** Siempre desconectar el equipo de la corriente antes de abrirlo. Parece obvio, pero es el error más frecuente.

### Ejercicios prácticos

**Ejercicio 1.1 — Conociéndonos**
Preséntate brevemente al grupo: tu nombre, tu experiencia previa con ordenadores (¡vale decir «ninguna»!) y qué te gustaría aprender en este curso.

**Ejercicio 1.2 — Vídeo y debate**
Después de ver el vídeo sobre riesgos eléctricos en el taller, responde:

1. ¿Cuál es el voltaje de la red eléctrica doméstica en España?
2. ¿Qué significa ESD y por qué es peligroso para los componentes?
3. Nombra tres medidas para evitar descargas electrostáticas.

**Ejercicio 1.3 — Test inicial de nivel**
Responde con sinceridad (no cuenta para nota, es solo para que el profesor adapte el ritmo):

1. ¿Has abierto alguna vez un ordenador?
2. ¿Sabrías decir qué es la RAM?
3. ¿Conoces la diferencia entre un disco duro y un SSD?
4. ¿Has instalado alguna vez un sistema operativo?

# Sesión 2 — Ju 12/03

## Seguridad en el taller

### Parte teórica

Hoy vamos a poner en práctica lo que aprendimos ayer, pero primero profundicemos un poco más.

**Puesta a tierra**

Todos los enchufes de un taller deben tener **toma de tierra** (el tercer pin del enchufe, el de arriba). La toma de tierra es un cable que va literalmente enterrado en el suelo del edificio. Si un aparato tiene un fallo y la carcasa se electrifica, la corriente se va por tierra en lugar de pasar por tu cuerpo.

> 💡 **Truco:** Si miras un enchufe español, los dos agujeros son la fase y el neutro. La patilla metálica de arriba y abajo es la tierra. Si un enchufe no tiene tierra, **no lo uses** para tu banco de trabajo.

**La muñequera antiestática en detalle**

Es una pulsera con una parte metálica que toca tu piel y un cable con pinza cocodrilo que enganchas a una superficie metálica conectada a tierra (normalmente el chasis del PC). Así, cualquier carga estática que genere tu cuerpo se disipa de forma segura.

**Cómo usarla correctamente:**

1. Colócala en la muñeca (ajustada, que la parte metálica toque la piel).
2. Conecta la pinza al chasis metálico (sin pintura) del PC o al punto de tierra del banco.
3. Verifica que el cable no está roto ni suelto.

**Organización del puesto de trabajo**

Un taller ordenado es un taller seguro:

- Mantén las herramientas organizadas.
- No dejes tornillos sueltos sobre la mesa (pueden caer dentro de la placa base y provocar cortocircuitos).
- Usa botes magnéticos o bandejas para los tornillos.
- Buena iluminación: necesitas ver bien lo que haces.

### Ejercicios prácticos

**Ejercicio 2.1 — Inspección del aula-taller**
Recorre el aula-taller con tu compañero/a y completa esta lista:

| Elemento                   | ¿Está presente? | ¿En buen estado? | Ubicación |
| -------------------------- |:---------------:|:----------------:| --------- |
| Extintor                   | ☐ Sí ☐ No       | ☐ Sí ☐ No        |           |
| Toma de tierra en enchufes | ☐ Sí ☐ No       | ☐ Sí ☐ No        |           |
| Muñequera antiestática     | ☐ Sí ☐ No       | ☐ Sí ☐ No        |           |
| Alfombrilla antiestática   | ☐ Sí ☐ No       | ☐ Sí ☐ No        |           |
| Iluminación adecuada       | ☐ Sí ☐ No       | ☐ Sí ☐ No        |           |
| Señalización de emergencia | ☐ Sí ☐ No       | ☐ Sí ☐ No        |           |

**Ejercicio 2.2 — Cuestionario de seguridad**

1. ¿Para qué sirve la toma de tierra?
2. ¿Qué ocurre si conectas la muñequera antiestática pero el cable está roto?
3. ¿Por qué no debemos dejar tornillos sueltos sobre la placa base?
4. Un compañero quiere abrir el PC para cambiar la RAM, pero no desconecta el cable de corriente. ¿Qué le dirías?

# Sesión 3 — Vi 13/03

## Herramientas de montaje

### Parte teórica

Hoy toca conocer las herramientas que usarás durante todo el curso. La buena noticia: no necesitas muchas.

**Herramientas básicas**

| Herramienta                       | Para qué la usamos                                                                   |
| --------------------------------- | ------------------------------------------------------------------------------------ |
| **Destornillador Phillips #2**    | El 90% de los tornillos de un PC. Es el de estrella de tamaño mediano.               |
| **Destornillador Phillips #1**    | Para tornillos más pequeños (portátiles, SSD M.2).                                   |
| **Destornillador plano pequeño**  | Algún tornillo antiguo o para hacer palanca con cuidado.                             |
| **Bridas de plástico (zip ties)** | Para organizar y sujetar cables dentro de la caja.                                   |
| **Alicates de corte**             | Para cortar las bridas sobrantes.                                                    |
| **Pasta térmica**                 | Se aplica entre el procesador y el disipador para mejorar la transferencia de calor. |
| **Linterna o frontal**            | Para ver dentro de la caja en zonas oscuras.                                         |

**Herramientas opcionales pero útiles**

| Herramienta                        | Para qué la usamos                                                       |
| ---------------------------------- | ------------------------------------------------------------------------ |
| **Multímetro**                     | Medir voltajes de la fuente de alimentación para verificar que funciona. |
| **Aire comprimido**                | Limpiar polvo de componentes y ventiladores.                             |
| **Pinzas antiestáticas**           | Colocar jumpers o recuperar tornillos caídos en sitios difíciles.        |
| **Espátula de plástico (spudger)** | Para hacer palanca sin rayar ni dañar componentes.                       |
| **Kit de puntas magnéticas**       | Juego de destornilladores con puntas intercambiables. Muy práctico.      |

**Sobre la pasta térmica**

La pasta térmica es un material conductor del calor que se pone entre el procesador y el disipador/ventilador. Sin ella, el procesador se calentaría demasiado y se apagaría para protegerse (o peor, se dañaría).

- Se aplica una cantidad pequeña: del tamaño de un grano de arroz o un guisante en el centro del procesador.
- No la extiendas: la presión del disipador la reparte sola.
- Si quitas el disipador, hay que limpiar la pasta vieja y poner nueva.

### Ejercicios prácticos

**Ejercicio 3.1 — Inventario de herramientas**
En tu puesto de trabajo tienes un kit de herramientas. Identifica cada una y completa:

| Herramienta                | ¿La encuentras? | ¿En buen estado? |
| -------------------------- |:---------------:|:----------------:|
| Destornillador Phillips #2 | ☐               | ☐                |

| Bridas de plástico         | ☐               | ☐                |
| Alicates de corte          | ☐               | ☐                |
| Pasta térmica              | ☐               | ☐                |
| Muñequera antiestática     | ☐               | ☐                |

**Ejercicio 3.2 — Práctica con destornilladores**
El profesor te dará varios tornillos de distinto tipo. Identifica cuál es Phillips y cuál es plano, y practica atornillar/desatornillar en una pieza de prueba. Recuerda: **nunca fuerces** un tornillo. Si no entra, probablemente estás usando el tamaño incorrecto.

**Ejercicio 3.3 — Aplicar pasta térmica (simulación)**
Con un procesador viejo y pasta térmica, practica:

1. Limpiar restos de pasta antigua con alcohol isopropílico y un paño sin pelusa.
2. Aplicar la cantidad correcta (un grano de arroz).
3. Colocar el disipador encima y observar cómo se reparte.

# Sesión 4 — Lu 16/03

## Introducción a la placa base

### Parte teórica

La **placa base** (también llamada *motherboard* o *placa madre*) es el componente más importante del PC. Es una placa de circuito impreso grande que conecta todos los demás componentes entre sí. Piensa en ella como la «ciudad» donde viven todos los habitantes del ordenador: el procesador, la memoria, el almacenamiento…

**Bloques funcionales de un PC**

Un ordenador, por complejo que parezca, se puede dividir en bloques simples:

```
┌──────────────────────────────────────────────┐
│                PLACA BASE                     │
│                                               │
│  ┌─────────┐  ┌─────┐  ┌──────────────────┐  │
│  │Procesador│  │ RAM │  │ Tarjetas de      │  │
│  │  (CPU)   │  │     │  │ expansión (GPU…) │  │
│  └─────────┘  └─────┘  └──────────────────┘  │
│                                               │
│  ┌──────────────┐  ┌──────────────────────┐   │
│  │Almacenamiento│  │ Conectores E/S       │   │
│  │ (SSD, HDD)   │  │ (USB, audio, red…)   │   │
│  └──────────────┘  └──────────────────────┘   │
│                                               │
└──────────────────────────────────────────────┘
         ↑
    Fuente de alimentación (da corriente a todo)
```

**Cada bloque, en pocas palabras:**

- **Procesador (CPU):** El «cerebro». Ejecuta las instrucciones de los programas.
- **Memoria RAM:** La «mesa de trabajo». Almacena temporalmente lo que el PC está usando en ese momento. Se borra al apagar.
- **Almacenamiento (SSD/HDD):** El «armario». Guarda tus archivos, programas y el sistema operativo de forma permanente.
- **Tarjetas de expansión:** Añaden funcionalidades extra (gráficos potentes, red más rápida…).
- **Fuente de alimentación:** Convierte la corriente del enchufe (230V alterna) en los voltajes que necesitan los componentes (12V, 5V, 3.3V continua).
- **Caja/chasis:** La «casa» que protege y organiza todo.

**Un poco de historia (muy resumida)**

| Época   | Hito                                                                                     |
| ------- | ---------------------------------------------------------------------------------------- |
| 1981    | IBM lanza el primer PC. Los componentes estaban soldados a la placa.                     |
| Años 90 | Se estandarizan los formatos (ATX). Puedes intercambiar piezas entre fabricantes.        |
| 2000s   | Aparecen los buses PCIe, USB 2.0, SATA.                                                  |
| Hoy     | PCIe 5.0, DDR5, USB4, NVMe ultrarrápido. Los principios son los mismos, solo más rápido. |

### Ejercicios prácticos

**Ejercicio 4.1 — Identifica los bloques**
El profesor te dará una placa base real (o una imagen grande). Señala y etiqueta:

1. El socket del procesador
2. Las ranuras de RAM
3. Las ranuras PCIe (para tarjetas de expansión)
4. Los conectores SATA (para discos)
5. El conector de alimentación principal (24 pines)
6. Los conectores del panel trasero (USB, audio, red…)

**Ejercicio 4.2 — Esquema de bloques**
Dibuja en tu cuaderno un esquema simple (como el de arriba) con los bloques funcionales de un PC. Usa flechas para indicar cómo se comunican entre sí a través de la placa base.

# Sesión 5 — Ma 17/03

## Factores de forma y componentes de la placa base

### Parte teórica

**¿Qué es un factor de forma?**

El factor de forma es simplemente el **tamaño y la disposición** estandarizada de una placa base. Gracias a estos estándares, una placa ATX de ASUS encaja en la misma caja que una ATX de Gigabyte. Los más comunes:

| Factor de forma      | Tamaño (mm) | Características                                                                                           |
| -------------------- | ----------- | --------------------------------------------------------------------------------------------------------- |
| **ATX**              | 305 × 244   | El estándar. Muchas ranuras de expansión (7), espacio de sobra. Para PCs de escritorio normales y gaming. |
| **Micro-ATX (mATX)** | 244 × 244   | Más compacta. Menos ranuras (4), pero suficiente para la mayoría de usuarios.                             |
| **Mini-ITX**         | 170 × 170   | Muy pequeña. Solo 1 ranura PCIe. Para PCs compactos (salón, HTPC).                                        |

> 💡 Las cajas están diseñadas para un factor de forma máximo. Una caja ATX admite placas ATX, mATX y Mini-ITX. Una caja Mini-ITX solo admite Mini-ITX.

**Componentes clave de la placa base**

| Componente                            | Qué hace                                                                                                                                               |
| ------------------------------------- | ------------------------------------------------------------------------------------------------------------------------------------------------------ |
| **Chipset**                           | El «director de tráfico». Gestiona la comunicación entre el procesador, la RAM, el almacenamiento y los periféricos.                                   |
| **VRM (módulo regulador de voltaje)** | Convierte y estabiliza el voltaje que llega al procesador. Cuanto mejor sea, más estable funciona la CPU.                                              |
| **BIOS/UEFI**                         | Un pequeño programa almacenado en un chip de la placa. Es lo primero que se ejecuta al encender: comprueba el hardware y arranca el sistema operativo. |
| **Pila CMOS**                         | Una pila de botón (CR2032) que mantiene la configuración de la BIOS cuando el PC está apagado (fecha, hora, ajustes).                                  |
| **Conectores de alimentación**        | El de 24 pines (alimentación principal) y el de 4/8 pines (alimentación del procesador).                                                               |

**El chipset en detalle**

En placas modernas, el chipset suele ser un único chip (antes eran dos: «puente norte» y «puente sur»). El nombre del chipset te dice con qué procesadores es compatible. Por ejemplo:

- **Intel B760, Z790** → Para procesadores Intel de 12ª/13ª/14ª generación
- **AMD B650, X670** → Para procesadores AMD Ryzen 7000

# Sesión 6 — Mi 18/03

## Sockets, buses y ranuras de expansión

### Parte teórica

**El socket (zócalo del procesador)**

El socket es el conector donde encaja el procesador en la placa base. Cada familia de procesadores usa un socket diferente, así que **no todos los procesadores valen para todas las placas**.

| Socket       | Fabricante | Procesadores compatibles                             |
| ------------ | ---------- | ---------------------------------------------------- |
| **LGA 1700** | Intel      | 12ª, 13ª, 14ª generación (Core i3/i5/i7/i9)          |
| **LGA 1851** | Intel      | Core Ultra 200 (Arrow Lake)                          |
| **AM5**      | AMD        | Ryzen 7000, 9000                                     |
| **AM4**      | AMD        | Ryzen 1000–5000 (anterior generación, muy extendido) |

> **LGA** significa *Land Grid Array*: los pines están en la placa, no en el procesador. **PGA** (*Pin Grid Array*): los pines están en el procesador (usado en AM4). En AM5, AMD cambió a LGA.

**Los buses: las «autopistas» del PC**

Los componentes se comunican entre sí a través de **buses**, que son como autopistas de datos:

- **PCIe (PCI Express):** El bus principal moderno. Conecta la tarjeta gráfica, SSDs NVMe, tarjetas de red, etc. Versiones: PCIe 3.0, 4.0, 5.0 (cada generación duplica la velocidad).
- **DMI (Direct Media Interface):** Conecta el procesador con el chipset (en sistemas Intel).
- **Infinity Fabric:** Equivalente en AMD.

**Ranuras de expansión PCIe**

Las ranuras PCIe tienen diferentes tamaños según el número de «líneas» (lanes):

| Ranura       | Líneas    | Uso típico                                               |
| ------------ | --------- | -------------------------------------------------------- |
| **PCIe x16** | 16 líneas | Tarjeta gráfica (la más larga)                           |
| **PCIe x4**  | 4 líneas  | SSD NVMe, tarjetas de red rápidas                        |
| **PCIe x1**  | 1 línea   | Tarjetas de sonido, USB adicionales, etc. (la más corta) |

> 💡 Una tarjeta pequeña (x1) puede funcionar en una ranura grande (x16), pero no al revés.

## El procesador: arquitecturas y familias

### Parte teórica

El **procesador** o **CPU** (*Central Processing Unit*) es el cerebro del ordenador. Ejecuta miles de millones de instrucciones por segundo. Vamos a entender cómo funciona sin necesidad de ser ingenieros.

**¿Qué hace exactamente?**

Todo lo que ocurre en tu ordenador (mover el ratón, abrir un programa, reproducir un vídeo) se traduce en instrucciones muy simples que el procesador ejecuta una tras otra a velocidades increíbles.

**Arquitecturas: x86 y x64**

- **x86:** Arquitectura de 32 bits, creada por Intel en 1978. Puede manejar hasta 4 GB de RAM.
- **x86-64 (o x64):** Extensión a 64 bits, creada por AMD en 2003. Puede manejar hasta 128 GB, 256 GB o más de RAM. Es lo que usan todos los PCs actuales.

> Cuando descargas un programa y te pregunta si quieres la versión «32 bits» o «64 bits», se refiere a esto. Hoy en día, elige siempre 64 bits.

**Las dos grandes familias**

|                     | Intel               | AMD     |
| ------------------- | ------------------- | ------- |
| **Gama de entrada** | Core i3 / Core 3    | Ryzen 3 |
| **Gama media**      | Core i5 / Core 5    | Ryzen 5 |
| **Gama alta**       | Core i7 / Core 7    | Ryzen 7 |
| **Gama entusiasta** | Core i9 / Core 9    | Ryzen 9 |
| **Socket actual**   | LGA 1700 / LGA 1851 | AM5     |

> Ambas marcas fabrican procesadores excelentes. La «mejor» opción depende del presupuesto y el uso que le vayas a dar al equipo.

**¿Cómo leer el nombre de un procesador?**

Ejemplo: **Intel Core i5-14600K**

- **Core i5** → Gama media
- **14** → 14ª generación
- **600** → Modelo dentro de esa gama
- **K** → Desbloqueado para *overclocking* (subir la velocidad manualmente)

Ejemplo: **AMD Ryzen 5 7600X**

- **Ryzen 5** → Gama media
- **7** → Serie 7000
- **600** → Modelo
- **X** → Versión de mayor rendimiento

# Sesión 8 — Vi 20/03

## Características del procesador

### Parte teórica

**Núcleos e hilos**

- **Núcleo (core):** Cada núcleo es como un trabajador independiente. Un procesador de 6 núcleos puede hacer 6 tareas simultáneas.
- **Hilo (thread):** Gracias a una tecnología llamada *Hyper-Threading* (Intel) o *SMT* (AMD), cada núcleo puede gestionar 2 tareas a la vez. Un procesador de 6 núcleos/12 hilos puede manejar 12 tareas simultáneas.

> 💡 Más núcleos = mejor para tareas que se pueden dividir (edición de vídeo, renderizado 3D). Más velocidad por núcleo = mejor para tareas que dependen de un solo hilo (muchos videojuegos, ofimática).

**Frecuencia (velocidad del reloj)**

Se mide en **GHz** (gigahercios = miles de millones de ciclos por segundo).

- **Frecuencia base:** La velocidad mínima garantizada (ej: 3.5 GHz).
- **Frecuencia turbo/boost:** La velocidad máxima que alcanza cuando necesita más potencia (ej: 5.3 GHz). Se activa automáticamente.

**Memoria caché**

Es una memoria ultrarrápida integrada en el procesador. Almacena los datos que más usa para no tener que ir a buscarlos a la RAM (que es más lenta). Se divide en niveles:

- **L1:** Muy pequeña (KB), muy rápida. Cada núcleo tiene la suya.
- **L2:** Mediana (MB), rápida. Cada núcleo tiene la suya.
- **L3:** Grande (decenas de MB), compartida entre todos los núcleos.

**TDP (Thermal Design Power)**

El TDP indica cuánto calor genera el procesador, medido en vatios (W). Te dice qué tipo de refrigeración necesitas:

- **≤ 65W:** Un ventilador básico es suficiente.
- **65-125W:** Necesitas un buen disipador con ventilador.
- **> 125W:** Recomendable refrigeración líquida o disipadores de gama alta.

# Sesión 9 — Lu 23/03

## La memoria RAM: tipos y características

### Parte teórica

**¿Qué es la RAM?**

RAM significa *Random Access Memory* (memoria de acceso aleatorio). Es la memoria de trabajo del ordenador: almacena temporalmente los datos y programas que estás usando en ese momento.

Imagina que tu disco duro es un armario y la RAM es tu escritorio. Cuando abres un programa, el PC lo saca del armario (disco) y lo pone en el escritorio (RAM) para trabajar con él más rápido. Al apagar el PC, el escritorio se vacía.

**¿Cuánta RAM necesito?**

| Uso                            | RAM recomendada |
| ------------------------------ | --------------- |
| Ofimática básica, navegación   | 8 GB            |
| Uso general, multitarea        | 16 GB           |
| Gaming, edición de foto        | 16–32 GB        |
| Edición de vídeo 4K, diseño 3D | 32–64 GB        |

**Tipos de RAM actuales**

| Tipo     | Velocidad típica | Voltaje | Comentario                                        |
| -------- | ---------------- | ------- | ------------------------------------------------- |
| **DDR4** | 2400–3600 MHz    | 1.2V    | Todavía muy usado. Buena relación calidad/precio. |
| **DDR5** | 4800–8000+ MHz   | 1.1V    | La última generación. Más rápida, pero más cara.  |

> ⚠️ **DDR4 y DDR5 no son intercambiables.** Tienen diferente número de pines y una muesca en distinta posición. La placa base acepta uno u otro, nunca ambos.

**Conceptos clave**

- **Velocidad (MHz):** Cuanto mayor, más rápida. DDR4-3200 transfiere datos a 3200 millones de ciclos por segundo.
- **Latencia (CL):** El tiempo que tarda la RAM en responder a una petición. Menor es mejor. Ej: CL16 es mejor que CL18.
- **Capacidad:** Se mide en GB. Los módulos más comunes son de 8 GB y 16 GB.

# Sesión 10 — Ma 24/03

## Configuración de la memoria RAM

### Parte teórica

**Dual Channel: el doble de ancho de banda**

La mayoría de las placas base actuales soportan **Dual Channel**, que permite usar dos módulos de RAM a la vez para duplicar el ancho de banda (la «autopista» de datos se hace el doble de ancha).

**¿Cómo activarlo?**

No necesitas hacer nada especial, solo colocar los módulos en las ranuras correctas:

- Si la placa tiene 4 ranuras (A1, A2, B1, B2), normalmente se usa **A2 y B2** (la 2ª y la 4ª ranura, contando desde el procesador). Consulta siempre el manual de la placa.
- Los módulos deben ser del **mismo tipo, velocidad y preferiblemente capacidad**.

```
Socket CPU  [RAM A1]  [RAM A2]  [RAM B1]  [RAM B2]
             vacía    ← 8GB →   vacía    ← 8GB →
                      Canal A             Canal B
```

**Perfiles XMP/EXPO**

Cuando compras RAM de alta velocidad (por ejemplo, DDR4-3600), el módulo viene configurado de fábrica a la velocidad base (2133 MHz para DDR4). Para que funcione a la velocidad anunciada, hay que activar el perfil **XMP** (Intel) o **EXPO** (AMD) en la BIOS.

Es muy sencillo: entras en la BIOS → buscas la opción XMP/EXPO → la activas → guardas y reinicias.

**Compatibilidad**

Antes de comprar RAM, verifica:

1. ¿Tu placa acepta DDR4 o DDR5?
2. ¿Cuál es la velocidad máxima soportada?
3. ¿Cuál es la capacidad máxima total?
4. ¿Cuántas ranuras tiene?

> 💡 Los fabricantes de placas base publican listas de compatibilidad (QVL) donde indican qué módulos de RAM han probado y funcionan bien.

# Sesión 11 — Mi 25/03

## Almacenamiento: el disco duro (HDD)

### Parte teórica

**¿Qué es un disco duro (HDD)?**

HDD significa *Hard Disk Drive*. Es el sistema de almacenamiento «clásico» que usan los ordenadores desde los años 80. Almacena tus archivos, programas y el sistema operativo de forma **permanente** (no se borra al apagar).

**¿Cómo funciona por dentro?**

Un HDD es básicamente un **tocadiscos de alta tecnología**:

- **Platos:** Discos metálicos que giran a gran velocidad (5400 o 7200 RPM = revoluciones por minuto).
- **Cabezal de lectura/escritura:** Un brazo mecánico que «flota» sobre los platos a nanómetros de distancia, leyendo y escribiendo datos magnéticamente.
- **Motor:** Hace girar los platos.
- **Controladora:** El chip que gestiona todo.

> ⚠️ Como tiene piezas mecánicas que se mueven, un HDD es **sensible a los golpes**. Un golpe mientras funciona puede hacer que el cabezal toque el plato y destruya datos.

**Interfaz de conexión: SATA**

Los HDD actuales se conectan a la placa base mediante un cable **SATA** (*Serial ATA*):

- **SATA III (6 Gbps):** La versión actual. Velocidad máxima teórica de 600 MB/s (aunque un HDD rara vez supera los 150–200 MB/s).
- El cable SATA es plano, estrecho y tiene un conector en forma de «L».
- Además del cable de datos, necesitan un cable de **alimentación SATA** desde la fuente.

**Ventajas e inconvenientes del HDD**

| ✅ Ventajas                            | ❌ Inconvenientes          |
| ------------------------------------- | ------------------------- |
| Muy barato por GB                     | Lento comparado con SSD   |
| Gran capacidad (1–20 TB)              | Ruidoso (se oye girar)    |
| Bueno para almacenar archivos grandes | Frágil (piezas mecánicas) |
|                                       | Consume más energía       |

### Ejercicios prácticos

**Ejercicio 11.1 — Desmontar un HDD**

1. Retira los tornillos de la tapa (algunos pueden estar ocultos bajo la etiqueta).
2. Observa los platos, el cabezal y el motor.
3. Haz un dibujo esquemático de lo que ves, etiquetando cada parte.

# Sesión 12 — Ju 26/03

## Almacenamiento: SSD (SATA y NVMe)

### Parte teórica

**¿Qué es un SSD?**

SSD significa *Solid State Drive* (unidad de estado sólido). A diferencia del HDD, **no tiene piezas móviles**. Almacena los datos en chips de memoria flash (la misma tecnología que un pendrive USB, pero mucho más rápida y fiable).

**¿Por qué es mejor que un HDD?**

| Característica          | HDD           | SSD SATA   | SSD NVMe        |
| ----------------------- | ------------- | ---------- | --------------- |
| Velocidad lectura       | ~150 MB/s     | ~550 MB/s  | ~3500–7000 MB/s |
| Tiempo arranque Windows | ~40 s         | ~15 s      | ~10 s           |
| Ruido                   | Sí (mecánico) | Silencioso | Silencioso      |
| Resistencia a golpes    | Baja          | Alta       | Alta            |
| Precio por TB           | ~30€          | ~60€       | ~70€            |

**Tipos de SSD**

1. **SSD SATA (2.5"):** Tiene forma de disco duro pequeño. Se conecta con cable SATA. Limitado a ~550 MB/s por la interfaz.

2. **SSD NVMe M.2:** Una pequeña tarjeta que se inserta directamente en la placa base (conector M.2). Va por el bus PCIe, así que es mucho más rápido.

```
SSD SATA 2.5"          SSD NVMe M.2
┌─────────────┐        ┌──────────────────┐
│             │        │ ▪▪▪▪▪▪▪▪▪▪▪▪▪▪▪ │  ← chips de memoria
│   7cm x 10cm│        │    2cm x 8cm     │
│             │        └──┬───────────────┘
└─────────────┘           └─ conector M.2
  Usa cable SATA          Va directo en la placa
```

**Tecnología NAND**

Los chips de memoria de los SSD usan tecnología **NAND Flash**. Hay varios tipos según cuántos bits almacena cada celda:

- **SLC (1 bit):** Más rápida y duradera, pero carísima. Uso profesional.
- **MLC (2 bits):** Buen equilibrio.
- **TLC (3 bits):** La más común. Buena relación calidad/precio.
- **QLC (4 bits):** Más barata, pero menos duradera. Para almacenamiento masivo.

> Para uso normal, un SSD TLC o QLC de marca conocida durará muchos años sin problema.

# Sesión 15 — Ma 07/04

## La caja y la fuente de alimentación

### Parte teórica

**La caja (chasis)**

La caja es la estructura que alberga y protege todos los componentes. Aspectos importantes:

| Característica        | Qué buscar                                                                                              |
| --------------------- | ------------------------------------------------------------------------------------------------------- |
| **Tamaño**            | Torre completa (Full Tower), torre media (Mid Tower), mini torre (Mini Tower), formato compacto (SFF).  |
| **Compatibilidad**    | ¿Admite tu placa base (ATX, mATX, Mini-ITX)? ¿Cabe tu tarjeta gráfica (mide la longitud máxima de GPU)? |
| **Ventilación**       | Número de posiciones para ventiladores. Filtros de polvo.                                               |
| **Gestión de cables** | Espacio trasero para pasar cables y mantener el interior ordenado.                                      |
| **Panel frontal**     | Puertos USB, botón de encendido, conector de audio.                                                     |

**La fuente de alimentación (PSU)**

Convierte la corriente alterna del enchufe (230V AC) en corriente continua a los voltajes que necesitan los componentes (12V, 5V, 3.3V DC).

**¿Cuántos vatios necesito?**

| Tipo de PC                    | Potencia recomendada |
| ----------------------------- | -------------------- |
| Ofimática (sin GPU dedicada)  | 300–450W             |
| Gaming medio                  | 550–650W             |
| Gaming alto / workstation     | 750–850W             |
| Entusiasta (GPU tope de gama) | 850–1000W+           |

**Certificación 80 Plus**

Indica la eficiencia energética de la fuente (cuánta energía del enchufe se convierte realmente en energía útil):

| Certificación    | Eficiencia |
| ---------------- | ---------- |
| 80 Plus          | ≥ 80%      |
| 80 Plus Bronze   | ≥ 82-85%   |
| 80 Plus Gold     | ≥ 87-90%   |
| 80 Plus Platinum | ≥ 90-92%   |

> 💡 Una fuente más eficiente desperdicia menos energía en forma de calor, es más silenciosa y dura más. Invierte en una buena fuente: es la que alimenta todo tu equipo.

**Conectores de la fuente**

| Conector       | Para qué                                  |
| -------------- | ----------------------------------------- |
| 24 pines ATX   | Alimentación principal de la placa base   |
| 4+4 pines EPS  | Alimentación del procesador               |
| PCIe 6+2 pines | Alimentación de la tarjeta gráfica        |
| SATA           | Alimentación de discos y unidades ópticas |
| Molex 4 pines  | Ventiladores y dispositivos antiguos      |

# Sesión 16 — Mi 08/04

## Ensamblaje (parte 1): procesador, disipador y RAM

### Parte teórica

¡Ha llegado el momento! Hoy empezamos a montar un PC real. Vamos paso a paso, sin prisas.

**Orden recomendado de montaje**

1. ✅ Instalar CPU en la placa base (fuera de la caja)
2. ✅ Instalar disipador/ventilador del procesador
3. ✅ Instalar RAM
4. Montar la fuente en la caja
5. Montar la placa base en la caja
6. Conectar almacenamiento
7. Conectar tarjeta gráfica
8. Cablear todo
9. Primer arranque

> 💡 Los pasos 1-3 se hacen **fuera de la caja**, con la placa apoyada sobre su caja de cartón o sobre una alfombrilla antiestática. Es mucho más fácil trabajar así.

**Paso 1: Instalar el procesador**

1. Levanta la palanca del socket.
2. Retira la tapa protectora de plástico (guárdala por si necesitas devolver la placa).
3. Localiza la **marca de orientación** (un triángulo dorado en una esquina del procesador que coincide con un triángulo en el socket).
4. Coloca el procesador suavemente. **No presiones.** Debe caer por su propio peso.
5. Baja la palanca para fijarlo.

> ⚠️ **NUNCA toques los contactos** (ni los del procesador ni los del socket). La grasa de tus dedos puede causar problemas de contacto.

**Paso 2: Aplicar pasta térmica e instalar el disipador**

1. Si el disipador es nuevo, puede traer pasta térmica preaplicada (una pasta gris en la base). En ese caso, no añadas más.
2. Si no trae pasta, aplica una cantidad del tamaño de un grano de arroz en el centro del procesador.
3. Coloca el disipador encima, alineando los anclajes con los agujeros de la placa.
4. Fija siguiendo un patrón en **X** (esquina opuesta) para que la presión sea uniforme.
5. Conecta el cable del ventilador al conector **CPU_FAN** de la placa base.

**Paso 3: Instalar la RAM**

1. Abre las pestañas de las ranuras correctas (recuerda: Dual Channel).
2. Alinea la muesca del módulo con la de la ranura.
3. Presiona firmemente y por igual en ambos extremos hasta oír el «clic».

### Ejercicios prácticos

**Ejercicio 16.1 — Montaje guiado**
Siguiendo las instrucciones del profesor paso a paso:

1. Instala el procesador en la placa base.
2. Aplica pasta térmica y monta el disipador.
3. Instala los módulos de RAM en las ranuras correctas.

**Lista de verificación:**

- [ ] El procesador está correctamente orientado (triángulo coincide).
- [ ] La palanca del socket está bajada y fijada.
- [ ] El disipador está bien sujeto (no se balancea).
- [ ] El ventilador está conectado a CPU_FAN.
- [ ] La RAM está en las ranuras correctas para Dual Channel.
- [ ] Se oyó el «clic» en ambos módulos de RAM.

# Sesión 17 — Ju 09/04

## Ensamblaje (parte 2): montaje en caja y cableado

### Parte teórica

**Paso 4: Montar la fuente en la caja**

1. La fuente se coloca generalmente en la **parte inferior trasera** de la caja.
2. Atorníllala con los 4 tornillos desde fuera.
3. El ventilador de la fuente suele ir hacia abajo (si la caja tiene rejilla inferior) para tomar aire fresco.

**Paso 5: Montar la placa base en la caja**

1. Instala primero los **separadores** (standoffs/spacers): son tornillos dorados que elevan la placa para que no toque el metal de la caja.
2. Coloca el **embellecedor I/O** (la chapa metálica del panel trasero) a presión desde dentro.
3. Introduce la placa y alinea los agujeros con los separadores.
4. Atornilla (sin apretar demasiado) en diagonal.

**Paso 6: Conectar almacenamiento**

- **SSD NVMe M.2:** Insértalo en ángulo en el conector M.2, presiónalo hacia abajo y fíjalo con su tornillo.
- **SSD SATA / HDD:** Colócalo en la bahía, conecta el cable SATA de datos a la placa y el cable SATA de alimentación desde la fuente.

**Paso 7: Conectar tarjeta gráfica**

1. Retira las tapas ciegas necesarias.
2. Inserta la GPU en la ranura PCIe x16.
3. Atornilla al chasis.
4. Conecta los cables de alimentación PCIe de la fuente.

**Paso 8: Cableado**

- Conectar el cable de 24 pines a la placa.
- Conectar el cable de 4+4 pines (CPU) a la placa.
- Conectar los cables del panel frontal (Power, Reset, LED, USB, audio). Son pequeños y están etiquetados. Consulta el manual de la placa para la posición exacta.

> 💡 Pasa los cables por la parte trasera de la caja siempre que sea posible. Un interior ordenado mejora el flujo de aire y facilita el mantenimiento.

### Ejercicios prácticos

**Ejercicio 17.1 — Montaje completo**
Continuando con el equipo de ayer:

1. Monta la fuente de alimentación en la caja.
2. Instala los separadores y monta la placa base.
3. Conecta el SSD/HDD.

5. Realiza todo el cableado.

2. Conecta el cable de corriente y un monitor.
3. Pulsa el botón de encendido.
4. Si ves la pantalla de la BIOS/UEFI: ¡enhorabuena, funciona!
5. Si no arranca, no te preocupes: mañana aprenderemos a diagnosticar problemas.

**Lista de verificación final:**

- [ ] Fuente atornillada, ventilador orientado correctamente.
- [ ] Separadores instalados (todos los necesarios, ni más ni menos).
- [ ] Placa base atornillada.
- [ ] Cable 24 pines conectado.
- [ ] Cable CPU 4+4 pines conectado.
- [ ] SSD/HDD conectado (datos + alimentación).

- [ ] Interior ordenado, sin cables sueltos sobre ventiladores.

# Sesión 18 — Vi 10/04

## Verificación, diagnóstico y evaluación

### Parte teórica

**El proceso POST (Power-On Self-Test)**

Cuando enciendes un PC, lo primero que ocurre es el **POST**: la BIOS/UEFI comprueba que todos los componentes esenciales funcionan.

Si algo falla, el PC te avisa de diferentes formas:

- **Pitidos (beeps):** Si hay altavoz interno (*speaker*), emite pitidos codificados.
- **LEDs de diagnóstico:** Muchas placas modernas tienen LEDs que indican CPU, RAM, GPU, BOOT.
- **Códigos en pantalla:** Algunas placas muestran un código de 2 dígitos en un display.

**Problemas comunes y soluciones**

| Síntoma                               | Causa probable                                   | Solución                                           |
| ------------------------------------- | ------------------------------------------------ | -------------------------------------------------- |
| No enciende nada                      | Fuente no conectada o interruptor trasero en OFF | Verificar cables y el interruptor I/O de la fuente |
| Ventiladores giran pero no hay imagen | RAM mal insertada o GPU no conectada             | Recolocar RAM, verificar GPU y su alimentación     |
| Pitidos continuos                     | RAM no detectada                                 | Limpiar contactos de la RAM, cambiar de ranura     |
| Se enciende y se apaga en bucle       | Disipador mal montado (CPU se sobrecalienta)     | Verificar disipador, pasta térmica y ventilador    |
| Entra a BIOS pero no arranca SO       | Normal: aún no hemos instalado sistema operativo | No es un error, es el siguiente paso del curso     |

**Herramientas de diagnóstico por software**

Una vez el equipo arranca, podemos usar estas herramientas para verificar que todo está bien:

| Herramienta         | Qué comprueba                                                | Gratuita |
| ------------------- | ------------------------------------------------------------ | -------- |
| **MemTest86**       | Memoria RAM (errores)                                        | Sí       |
| **CrystalDiskInfo** | Salud del disco (SSD/HDD)                                    | Sí       |
| **HWiNFO**          | Temperaturas, voltajes, información de todos los componentes | Sí       |
| **CPU-Z**           | Información detallada del procesador y RAM                   | Sí       |
| **GPU-Z**           | Información detallada de la tarjeta gráfica                  | Sí       |

### Ejercicios prácticos

# Sesión 1 — Lu 13/04
## Clasificación de periféricos. Teclados y ratones

### Parte teórica

**¿Qué es un periférico?**

Un periférico es cualquier dispositivo que se conecta al ordenador para comunicarse con el usuario o con otros sistemas. Se clasifican en:

| Tipo | Función | Ejemplos |
|------|---------|----------|
| **Entrada** | Envían información al PC | Teclado, ratón, escáner, micrófono, cámara web |
| **Salida** | Reciben información del PC | Monitor, impresora, altavoces, proyector |
| **Entrada/Salida (E/S)** | Hacen ambas cosas | Pantalla táctil, impresora multifunción, auriculares con micro |
| **Almacenamiento externo** | Guardan datos fuera del PC | Pendrive USB, disco externo, tarjeta SD |
| **Comunicaciones** | Conectan el PC con redes | Adaptador Wi-Fi, router, switch de red |

**El teclado**

Hay dos tecnologías principales:

| Tipo | Cómo funciona | Ventajas | Inconvenientes |
|------|--------------|----------|----------------|
| **Membrana** | Al pulsar, dos capas de plástico hacen contacto | Barato, silencioso | Tacto «blandito», menos duradero |
| **Mecánico** | Cada tecla tiene un interruptor (switch) independiente | Tacto preciso, muy duradero | Más caro, puede ser ruidoso |

Los switches mecánicos más conocidos son los **Cherry MX**:
- **Azul (Blue):** Táctil con «clic» audible. Ideal para escribir.
- **Rojo (Red):** Lineal, suave, silencioso. Popular para gaming.
- **Marrón (Brown):** Táctil sin clic. Equilibrio entre escritura y gaming.

**El ratón**

| Tipo | Sensor | Uso |
|------|--------|-----|
| **Óptico** | LED rojo | Uso general. Funciona en la mayoría de superficies. |
| **Láser** | Láser infrarrojo | Más preciso. Funciona en superficies pulidas (cristal). |

Conceptos clave del ratón:
- **DPI (Dots Per Inch):** Sensibilidad. Más DPI = el cursor se mueve más rápido. Los ratones gaming permiten ajustar los DPI (800, 1600, 3200…).
- **Polling rate (Hz):** Frecuencia con la que el ratón informa su posición al PC. 1000 Hz = 1000 veces por segundo.
- **Conexión:** USB con cable, USB inalámbrico (con dongle), Bluetooth.

# Sesión 2 — Ma 14/04
## Escáneres, cámaras web y micrófonos

### Parte teórica

**Escáneres**

Un escáner convierte documentos físicos (papel, fotos) en archivos digitales. Tipos principales:

| Tipo | Cómo funciona | Uso típico |
|------|--------------|-----------|
| **Plano (flatbed)** | Colocas el documento sobre un cristal y una barra de luz lo recorre | Fotos, documentos sueltos, libros |
| **Con alimentador (ADF)** | Los documentos pasan automáticamente uno a uno | Oficinas: escanear muchos documentos rápido |

Conceptos clave:
- **Resolución (PPP o DPI):** Puntos por pulgada. Más PPP = más detalle. Para documentos: 300 PPP. Para fotos de calidad: 600-1200 PPP.
- **Profundidad de color:** 24 bits (16 millones de colores) es el estándar.

**Cámaras web (webcam)**

- Resolución: 720p (HD), 1080p (Full HD), 4K.
- Tasa de fotogramas: 30 fps es suficiente; 60 fps para mayor fluidez.
- Conexión: USB. Algunas tienen micrófono integrado.

**Micrófonos**

| Tipo | Características | Uso |
|------|----------------|-----|
| **Condensador** | Sensible, capta matices. Necesita alimentación (phantom power o USB). | Podcast, grabación, streaming |
| **Dinámico** | Más robusto, capta menos ruido ambiente. | Presentaciones, entornos ruidosos |
| **De solapa (lavalier)** | Pequeño, se engancha a la ropa | Videoconferencias, presentaciones |

### Ejercicios prácticos

**Ejercicio 2.1 — Escanear un documento**
1. Conecta el escáner al PC por USB.
2. Si el PC no lo reconoce automáticamente, instala el driver (el profesor te indicará la fuente).
3. Abre el software de escaneo (o usa la app «Escáner de Windows»).
4. Escanea un documento a 300 PPP en formato PDF.
5. Escanea una foto a 600 PPP en formato JPEG.
6. Compara los tamaños de archivo resultantes.

| Documento | Resolución | Formato | Tamaño archivo |
|-----------|-----------|---------|---------------|
| Documento de texto | 300 PPP | PDF | |
| Fotografía | 600 PPP | JPEG | |

**Ejercicio 2.2 — Configurar webcam**
1. Conecta una webcam al USB del PC.
2. Abre la app «Cámara» de Windows.
3. Ajusta la resolución y comprueba la calidad de imagen.
4. Si la webcam tiene micrófono integrado, graba un vídeo corto de 10 segundos y reprodúcelo.

# Sesión 3 — Mi 15/04
## Monitores

### Parte teórica

El monitor es el periférico de salida más importante. Veamos qué opciones hay y cómo elegir.

**Tecnologías de panel**

| Tecnología | Ventajas | Inconvenientes |
|-----------|----------|----------------|
| **IPS** | Colores precisos, buenos ángulos de visión | Más caro, menor contraste que VA |
| **VA** | Buen contraste (negros profundos), buen precio | Ángulos de visión peores que IPS |
| **TN** | Muy rápido (tiempo de respuesta bajo) | Colores y ángulos de visión pobres. En desuso. |
| **OLED** | Contraste infinito (negro puro), colores espectaculares | Caro, riesgo de quemado (burn-in) |

**Especificaciones clave**

| Especificación | Qué significa | Recomendación |
|---------------|--------------|--------------|
| **Resolución** | Píxeles en pantalla | Full HD (1920×1080) para uso general; 4K (3840×2160) para diseño |
| **Tamaño** | Diagonal en pulgadas | 24" para Full HD; 27" para QHD/4K |
| **Frecuencia de refresco** | Veces por segundo que se actualiza la imagen | 60 Hz para oficina; 144+ Hz para gaming |
| **Tiempo de respuesta** | Rapidez de cambio de color de un píxel | ≤5 ms para uso general; ≤1 ms para gaming |
| **Brillo** | Medido en nits | ≥250 nits para interiores |

**Conectores de vídeo (repaso rápido)**

- **HDMI:** El más universal. Soporta audio + vídeo.
- **DisplayPort:** Estándar en monitores de PC. Permite encadenar monitores (daisy chain).
- **USB-C/Thunderbolt:** Un solo cable para vídeo, datos y carga.
- **VGA/DVI:** Anticuados. Evítalos si puedes.

# Sesión 4 — Ju 16/04
## Impresoras: tipos e instalación

### Parte teórica

**Tipos de impresoras**

| Tipo | Cómo imprime | Coste por página | Velocidad | Uso ideal |
|------|-------------|-----------------|-----------|-----------|
| **Inyección de tinta** | Pulveriza gotitas de tinta líquida sobre el papel | Alto (los cartuchos son caros) | Media | Fotos, uso doméstico bajo volumen |
| **Láser** | Un láser «dibuja» la imagen en un tambor que se cubre de tóner (polvo) y lo transfiere al papel con calor | Bajo | Alta | Oficina, alto volumen de texto |
| **Térmica** | Calor sobre papel especial sensible al calor | Muy bajo (no usa tinta) | Alta | Recibos, tickets, etiquetas |

**Instalar una impresora local (USB)**

1. Conecta la impresora al PC con cable USB.
2. Windows suele instalar automáticamente el driver genérico.
3. Para funciones avanzadas, instala el driver del fabricante (descárgalo de su web).
4. Ve a **Configuración → Dispositivos → Impresoras y escáneres** para verificar.

**Instalar una impresora en red**

Muchas impresoras de oficina se conectan a la red (Ethernet o Wi-Fi):
1. Conecta la impresora a la red (cable Ethernet al router/switch o configurando Wi-Fi desde el panel de la impresora).
2. En el PC: **Configuración → Agregar impresora** → Windows la detecta en la red.
3. Si no la detecta, añádela manualmente por su dirección IP.

**La cola de impresión**

Cuando mandas a imprimir, el documento no va directo a la impresora. Se pone en una **cola de impresión** (como una fila de espera). Desde ahí puedes:
- Ver los documentos pendientes.
- Cancelar un trabajo de impresión.
- Pausar la cola.

> 💡 Si la impresora «no imprime», lo primero: mira la cola de impresión. Muchas veces hay un trabajo atascado bloqueando el resto.

### Ejercicios prácticos

**Ejercicio 4.1 — Instalar una impresora láser**
1. Conecta la impresora al PC (USB o red, según disponibilidad).
2. Verifica que Windows la detecta en Configuración → Impresoras.
3. Si no la detecta, descarga e instala el driver del fabricante.
4. Imprime una página de prueba: clic derecho en la impresora → «Imprimir página de prueba».

**Ejercicio 4.2 — La cola de impresión**
1. Envía 3 documentos a imprimir.
2. Antes de que termine, abre la cola de impresión (doble clic en la impresora).
3. Pausa la cola.
4. Cancela el segundo documento.
5. Reanuda la cola y comprueba que imprime el primero y el tercero.

### Parte teórica

**Mantenimiento básico de impresoras**

| Tarea | Inyección de tinta | Láser |

| Sustituir consumibles | Cambiar cartuchos de tinta | Cambiar tóner y tambor/drum |
| Limpieza de cabezales | Desde el software de la impresora (limpieza automática) | No aplica |
| Limpieza interior | Limpiar rodillos con paño húmedo | Aspirar restos de tóner (nunca con aspiradora normal, usar específica para tóner) |
| Atasco de papel | Abrir la tapa, retirar el papel atascado con cuidado (sin tirar fuerte) | Igual, pero cuidado: el fusor está caliente |

> ⚠️ El tóner es un polvo muy fino. Si se derrama, **no lo soples** (se esparce por el aire y es nocivo para los pulmones). Usa un paño húmedo o una aspiradora específica para tóner.

**Sistemas de audio**

El sonido del PC sale por la **tarjeta de sonido** (generalmente integrada en la placa base) a través de conectores jack de 3.5 mm o por HDMI/DisplayPort al monitor.

**Configuraciones de audio:**

| Configuración | Descripción |
|--------------|-------------|
| **Estéreo (2.0)** | Dos altavoces: izquierdo y derecho |
| **2.1** | Dos altavoces + subwoofer (graves) |
| **5.1** | Cinco altavoces + subwoofer (sonido envolvente) |
| **7.1** | Siete altavoces + subwoofer (máxima inmersión) |

Los conectores de audio en la placa base suelen estar codificados por colores:
- **Verde:** Salida de altavoces frontales
- **Negro:** Altavoces traseros
- **Naranja:** Altavoz central + subwoofer
- **Azul:** Entrada de línea (line in)
- **Rosa:** Entrada de micrófono

# Sesión 6 — Lu 20/04
## Almacenamiento externo

### Parte teórica

**Periféricos de almacenamiento externo**

| Dispositivo | Conexión | Capacidad típica | Velocidad | Uso |
|------------|----------|-----------------|-----------|-----|
| **Pendrive USB** | USB-A o USB-C | 8 GB – 1 TB | Hasta 400 MB/s (USB 3.2) | Transferir archivos, arrancar SO |
| **Disco duro externo** | USB 3.0 | 1 – 5 TB | ~120 MB/s | Copias de seguridad, archivos grandes |
| **SSD externo** | USB-C 3.2 / Thunderbolt | 500 GB – 4 TB | 500–2000 MB/s | Edición de vídeo, copias rápidas |
| **Lector de tarjetas** | USB | Varía según tarjeta | Varía | Leer tarjetas SD de cámaras, móviles |
| **NAS (Network Attached Storage)** | Red (Ethernet) | 2 – 100+ TB | Depende de la red | Almacenamiento centralizado en red |

**¿Qué es un NAS?**

Un NAS es como un «disco duro con conexión a la red». Se conecta al router y todos los equipos de la red pueden acceder a sus archivos. Es ideal para:
- Copias de seguridad centralizadas.
- Compartir archivos entre varios ordenadores.
- Servidor multimedia (películas, música).

**Velocidades de transferencia: teoría vs. realidad**

| Interfaz | Velocidad teórica | Velocidad real aprox. |
|----------|------------------|-----------------------|
| USB 2.0 | 480 Mbps (60 MB/s) | ~30 MB/s |
| USB 3.0 | 5 Gbps (625 MB/s) | ~400 MB/s |
| USB 3.2 Gen 2 | 10 Gbps | ~800 MB/s |
| Thunderbolt 3/4 | 40 Gbps | ~2800 MB/s |

> 💡 La velocidad real siempre es menor que la teórica por la sobrecarga del protocolo, la velocidad del propio dispositivo y otros factores.

# Sesión 9 — Ma 28/04
## Instalación de drivers

### Parte teórica

**¿Qué es un driver (controlador)?**

Un driver es un pequeño programa que le dice al sistema operativo **cómo comunicarse con un dispositivo**. Sin el driver adecuado, el PC no sabe «hablar» con el periférico.

Piénsalo así: el driver es como un **traductor** entre el hardware y Windows.

**¿De dónde se obtienen los drivers?**

| Fuente | Fiabilidad | Cuándo usarla |
|--------|-----------|---------------|
| **Windows Update** | ✅ Alta | Windows descarga automáticamente drivers básicos para la mayoría de dispositivos |
| **Web del fabricante** | ✅ Alta | Para drivers actualizados o funciones avanzadas |
| **CD incluido con el dispositivo** | ⚠️ A menudo obsoleto | Solo si no hay internet; luego actualiza |
| **Webs de terceros** | ❌ Peligroso | **Nunca.** Riesgo de malware |

**El Administrador de dispositivos**

Es la herramienta de Windows para ver y gestionar todos los drivers:
- Abrir: clic derecho en el botón Inicio → «Administrador de dispositivos».
- Si un dispositivo tiene un **triángulo amarillo ⚠️**, significa que el driver tiene un problema.
- Si aparece como «Dispositivo desconocido», Windows no tiene driver para él.

**Instalar un driver manualmente:**
1. Descarga el driver de la web del fabricante (elige tu modelo exacto y versión de Windows).
2. Ejecuta el instalador (.exe) o, si es un archivo .inf, clic derecho → «Instalar».
3. Reinicia si te lo pide.
4. Verifica en el Administrador de dispositivos que ya no hay triángulo amarillo.

**Actualizar un driver:**
1. Administrador de dispositivos → clic derecho en el dispositivo → «Actualizar controlador».
2. «Buscar controladores automáticamente» (Windows busca online).
3. O «Buscar controladores en mi equipo» (si ya descargaste el archivo).

# Sesión 11 — Ju 30/04
## Diagnóstico de problemas con periféricos

### Parte teórica

**Metodología de diagnóstico**

Cuando un periférico no funciona, sigue estos pasos en orden:

```
1. ¿Está conectado? (parece broma, pero es la causa nº1)
        ↓
2. ¿Está encendido? (interruptores, pilas, batería)
        ↓
3. ¿Lo detecta Windows? (Administrador de dispositivos)
        ↓
4. ¿Tiene driver? (¿triángulo amarillo? ¿dispositivo desconocido?)
        ↓
5. Prueba en otro puerto / otro cable
        ↓
6. Prueba el periférico en otro PC (¿funciona allí?)
        ↓
7. Prueba otro periférico del mismo tipo en este PC
        ↓
8. Si llegaste aquí: probablemente el periférico está averiado
```

**Problemas frecuentes y soluciones**

| Problema | Causa habitual | Solución |
|----------|---------------|----------|
| El monitor dice «Sin señal» | Cable suelto o puerto equivocado | Verificar cable. Si hay GPU, conectar al monitor a la GPU (no a la placa). |
| La impresora no imprime | Cola atascada o desconectada de la red | Revisar cola. Reiniciar la impresora. Verificar conexión. |
| El teclado/ratón USB no responde | Puerto USB defectuoso | Probar en otro puerto. |
| Bluetooth no encuentra el dispositivo | No está en modo emparejamiento | Activar modo pairing en el dispositivo. |
| El audio no suena | Salida de audio incorrecta en Windows | Clic derecho en icono de sonido → Configuración → Seleccionar salida correcta. |
| Periférico funciona «a medias» | Driver genérico en lugar del específico | Instalar driver del fabricante. |

# Sesión 1 — Ma 05/05
## Arquitectura de un sistema microinformático

### Parte teórica

Antes de instalar nada, necesitamos entender cómo se organiza un sistema informático. Piénsalo como capas, como las de una cebolla:

```
┌────────────────────────────────┐
│        APLICACIONES            │  ← Word, Chrome, Photoshop…
├────────────────────────────────┤
│     SISTEMA OPERATIVO          │  ← Windows, Linux, macOS
├────────────────────────────────┤
│        FIRMWARE (BIOS/UEFI)    │  ← Arranca el hardware
├────────────────────────────────┤
│        HARDWARE                │  ← CPU, RAM, disco, placa base…
└────────────────────────────────┘
```

**Cada capa, explicada:**

| Capa | Qué es | Ejemplo |
|------|--------|---------|
| **Hardware** | Los componentes físicos que ya conoces | Procesador, RAM, SSD… |
| **Firmware** | Software «grabado» en la placa base. Es lo primero que se ejecuta al encender. | BIOS (antiguo) o UEFI (moderno) |
| **Sistema operativo (SO)** | Software que gestiona el hardware y permite ejecutar aplicaciones. Es el «intermediario» entre tú y el ordenador. | Windows 11, Ubuntu Linux, macOS |
| **Aplicaciones** | Los programas que usas para trabajar, jugar, navegar… | Navegador web, procesador de textos… |

**Hardware base vs. software base**

- **Hardware base:** Los componentes mínimos para que el PC arranque (placa base, CPU, RAM, almacenamiento, fuente).
- **Software base:** El firmware + el sistema operativo. Sin ellos, el hardware es «un montón de piezas sin vida».

**BIOS vs UEFI**

| | BIOS (antiguo) | UEFI (moderno) |
|--|----------------|----------------|
| Interfaz | Texto, sin ratón | Gráfica, con ratón |
| Arranque | Lento, limitado | Rápido (Secure Boot, Fast Boot) |
| Discos | Hasta 2 TB (MBR) | Más de 2 TB (GPT) |
| Seguridad | Básica | Secure Boot (impide arrancar SO no firmados) |

### Ejercicios prácticos

# Sesión 2 — Mi 06/05
## Funciones del sistema operativo

### Parte teórica

**¿Qué hace exactamente un sistema operativo?**

El SO es como el **director de orquesta** del ordenador. Se encarga de:

| Función | Qué hace | Ejemplo |
|---------|---------|---------|
| **Gestión de procesos** | Decide qué programas se ejecutan, cuándo y durante cuánto tiempo | Cuando tienes Chrome, Spotify y Word abiertos, el SO reparte el tiempo de CPU entre los tres |
| **Gestión de memoria** | Asigna RAM a cada programa y se asegura de que no se «pisen» entre ellos | Si un programa necesita más RAM, el SO se la da (o la saca de otro sitio) |
| **Gestión de archivos** | Organiza los datos en el disco mediante carpetas y archivos | El sistema de archivos (NTFS, ext4…) es la forma en que el SO guarda y encuentra tus datos |
| **Gestión de E/S** | Comunica el software con el hardware (a través de los drivers) | Cuando mandas imprimir, el SO habla con el driver de la impresora |
| **Interfaz de usuario** | Te proporciona una forma de interactuar con el ordenador | El escritorio de Windows, la terminal de Linux… |
| **Seguridad** | Controla quién puede acceder a qué (usuarios, permisos) | Contraseñas, cuentas de usuario, permisos de archivos |

**Tipos de sistemas operativos**

| Tipo | Ejemplo | Uso |
|------|---------|-----|
| SO de escritorio | Windows, macOS, Linux | PCs y portátiles |
| SO móvil | Android, iOS | Smartphones y tablets |
| SO de servidor | Windows Server, Ubuntu Server | Servidores web, bases de datos |
| SO embebido | Sistema del router, smart TV | Dispositivos específicos |

### Ejercicios prácticos

**Ejercicio 2.1 — Debate: ¿qué SO usáis?**
En grupo, compartid:
1. ¿Qué sistema operativo usáis en vuestro PC/portátil? ¿Y en el móvil?

# Sesión 4 — Vi 08/05
## Estructura del sistema operativo

### Parte teórica

**¿Cómo está organizado un SO por dentro?**

```
┌──────────────────────────────────────┐
│           APLICACIONES               │  Modo usuario
├──────────────────────────────────────┤
│    Shell (Explorador / Terminal)      │
├──────────────────────────────────────┤
│    Servicios del sistema             │
├══════════════════════════════════════╡  ← Frontera
│    KERNEL (núcleo)                   │  Modo kernel
├──────────────────────────────────────┤
│    Drivers (controladores)           │
├──────────────────────────────────────┤
│    HARDWARE                          │
└──────────────────────────────────────┘
```

| Componente | Qué hace |
|-----------|---------|
| **Kernel (núcleo)** | El «corazón» del SO. Gestiona directamente el hardware: CPU, memoria, discos, red. |
| **Drivers** | Traducen entre el kernel y cada dispositivo específico. |
| **Servicios** | Programas que se ejecutan en segundo plano (antivirus, actualizaciones, cola de impresión…). |
| **Shell** | La interfaz con la que interactúas: Explorador de Windows (GUI) o terminal (CLI). |

**Modo usuario vs. modo kernel**

- **Modo kernel:** Acceso total al hardware. Solo el kernel y los drivers trabajan aquí. Si algo falla → pantalla azul (BSOD).
- **Modo usuario:** Acceso restringido. Las aplicaciones trabajan aquí. Si una app falla, solo se cierra ella, no el sistema.

> 💡 Esta separación es lo que hace que Windows o Linux sean **estables**: una app mal programada no puede «tirar» todo el sistema (bueno, casi nunca 😉).

# Sesión 5 — Lu 11/05
## Gestión de memoria y procesos

### Parte teórica

**Memoria virtual**

¿Qué pasa si abres tantos programas que se acaba la RAM? El SO usa un truco: la **memoria virtual**. Toma una parte del disco duro/SSD y la usa «como si fuera» RAM.

- En Windows se llama **archivo de paginación** (`pagefile.sys`).
- En Linux se llama **swap** (partición o archivo de intercambio).

> Es más lento que la RAM real (el disco es más lento), por eso cuando el PC «tira mucho de disco» se nota que va más lento.

**Planificación de procesos**

El SO debe repartir el tiempo de la CPU entre todos los programas abiertos. Esto lo hace el **planificador** (scheduler), que decide:
- Qué proceso se ejecuta ahora.
- Durante cuánto tiempo.
- Qué prioridad tiene.

En la práctica, el cambio es tan rápido (millones de veces por segundo) que parece que todos se ejecutan a la vez.

# Sesión 8 — Ju 14/05
## Particiones y sistemas de archivos

### Parte teórica

Antes de instalar un SO, necesitamos preparar el disco. Esto implica crear **particiones** y darles un **sistema de archivos**.

**¿Qué es una partición?**

Es una «división» del disco. Un disco de 500 GB puede tener, por ejemplo:
- Partición 1: 100 GB para Windows
- Partición 2: 400 GB para datos

Cada partición se comporta como un disco independiente.

**Tabla de particiones: MBR vs GPT**

| | MBR (antiguo) | GPT (moderno) |
|--|--------------|--------------|
| Tamaño máximo de disco | 2 TB | 9.4 ZB (prácticamente ilimitado) |
| Nº máximo de particiones primarias | 4 | 128 |
| Compatible con | BIOS y UEFI | Solo UEFI |
| Uso actual | PCs muy antiguos | Todo lo moderno |

> 💡 Si tu PC usa UEFI (que debería), usa siempre **GPT**.

**Sistemas de archivos**

El sistema de archivos es la «forma de organizar» los datos dentro de una partición. Es como elegir entre organizar tu armario con estantes o con cajones.

| Sistema | SO | Tamaño máx. archivo | Uso |
|---------|----|--------------------|-----|
| **NTFS** | Windows | 16 TB | Disco principal de Windows |
| **FAT32** | Todos | 4 GB | Pendrives, compatibilidad universal |
| **exFAT** | Todos | 128 PB | Pendrives grandes, tarjetas SD |
| **ext4** | Linux | 16 TB | Disco principal de Linux |

> ⚠️ FAT32 no puede guardar archivos de más de 4 GB. Si copias una película de 6 GB a un pendrive FAT32, dará error. Usa exFAT en su lugar.

# Sesión 12 — Mi 20/05

**El gestor de paquetes APT**

En Linux no descargas instaladores de internet como en Windows. Usas un **gestor de paquetes** que descarga e instala software desde repositorios oficiales (como una «tienda de apps» en la terminal).

| Comando | Qué hace | Ejemplo |
|---------|---------|---------|
| `sudo apt update` | Actualiza la lista de paquetes disponibles | (Ejecutar siempre antes de instalar) |
| `sudo apt upgrade` | Instala las actualizaciones de los paquetes ya instalados | |
| `sudo apt install nombre` | Instala un programa | `sudo apt install vlc` |
| `sudo apt remove nombre` | Desinstala un programa | `sudo apt remove vlc` |

**¿Qué es `sudo`?**

`sudo` significa «ejecutar como superusuario» (administrador). En Linux, las tareas que afectan al sistema (instalar, desinstalar, configurar) requieren permisos de administrador. `sudo` te los da temporalmente tras introducir tu contraseña.

> Es como cuando Windows te pide «¿Quieres permitir que esta aplicación haga cambios?» y pulsas «Sí».

**Software esencial para instalar**

```bash
sudo apt update
sudo apt install vlc gimp libreoffice firefox
```

# Sesión 13 — Ju 21/05
## Clonación y replicación: conceptos

### Parte teórica

**¿Qué es clonar un disco?**

Clonar es hacer una **copia exacta** de un disco o partición. Es como fotocopiar un libro entero: la copia es idéntica al original, bit a bit.

**¿Para qué sirve?**

| Uso | Ejemplo |
|-----|---------|
| **Copia de seguridad** | Crear una imagen del sistema antes de hacer cambios peligrosos |
| **Migración** | Pasar de un HDD a un SSD sin reinstalar nada |
| **Despliegue** | Instalar y configurar un PC «modelo» y clonar esa configuración a 50 PCs iguales |
| **Recuperación** | Si algo sale mal, restaurar el sistema a un estado anterior |

**Herramientas de clonación**

| Herramienta | Tipo | Gratuita | Plataforma |
|------------|------|----------|-----------|
| **Clonezilla** | Arranca desde USB, basada en Linux | Sí | Cualquiera |
| **Acronis True Image** | Aplicación de Windows | No (tiene versión de prueba) | Windows |
| **dd** | Comando de terminal Linux | Sí | Linux |
| **Macrium Reflect** | Aplicación de Windows | Versión free limitada | Windows |

**Imagen vs. clonación directa**

- **Clonación directa:** Disco A → Disco B. Se copia todo. El disco B es idéntico al A.
- **Imagen:** Disco A → Archivo .img/.iso. Se guarda la copia como un archivo que luego puedes restaurar en cualquier disco.

> 💡 Crear una **imagen** es más flexible: puedes guardarla en un disco externo, en un NAS, y restaurarla cuando quieras.

# Sesión 15 — Lu 25/05
## Replicación en red y actualizaciones

### Parte teórica

**Windows Update**

Windows Update es el servicio que descarga e instala actualizaciones de Microsoft:
- **Actualizaciones de seguridad:** Corrigen vulnerabilidades. Son las más importantes.
- **Actualizaciones de calidad:** Mejoras de rendimiento y corrección de errores.
- **Actualizaciones de funcionalidad:** Nuevas características (una o dos al año).

**Configurar Windows Update:**
- Configuración → Windows Update.
- «Buscar actualizaciones» para forzar la búsqueda.
- «Opciones avanzadas» para configurar horas de actividad, pausar actualizaciones, etc.

**WSUS (Windows Server Update Services)**

En empresas con muchos PCs, no es práctico que cada uno descargue las actualizaciones de internet. WSUS es un servidor que:
1. Descarga las actualizaciones una vez desde Microsoft.
2. Las distribuye a todos los PCs de la red local.
3. El administrador controla qué actualizaciones se aplican.

**Actualizar Linux**

```bash
sudo apt update        # Actualiza la lista de paquetes
sudo apt upgrade -y    # Instala las actualizaciones
sudo apt dist-upgrade  # Actualizaciones que requieren cambios de dependencias
```

# Sesión 1 — Mi 27/05
## Gestión de archivos en Windows

### Parte teórica

**El Explorador de archivos**

El Explorador de Windows es la herramienta con la que navegas por tus carpetas y archivos. Conceptos básicos:

- **Ruta:** La «dirección» de un archivo. Ejemplo: `C:\Users\Juan\Documentos\informe.docx`
  - `C:` → Unidad (disco o partición)
  - `\Users\Juan\Documentos\` → Carpetas (cada `\` separa un nivel)
  - `informe.docx` → Nombre del archivo + extensión

- **Extensión:** Las letras después del punto final del nombre. Le dicen a Windows qué tipo de archivo es:

| Extensión | Tipo |
|-----------|------|
| `.txt` | Texto plano |
| `.docx` | Documento Word |
| `.xlsx` | Hoja de cálculo Excel |
| `.pdf` | Documento PDF |
| `.jpg`, `.png` | Imagen |
| `.mp4`, `.avi` | Vídeo |
| `.exe` | Programa ejecutable |
| `.zip`, `.rar` | Archivo comprimido |

> ⚠️ Por defecto, Windows **oculta las extensiones**. Es recomendable mostrarlas: Explorador → Ver → Mostrar → Extensiones de nombre de archivo.

**Atributos de archivos**

Los archivos tienen propiedades ocultas llamadas **atributos**:
- **Solo lectura (R):** No se puede modificar.
- **Oculto (H):** No se ve normalmente en el Explorador.
- **Sistema (S):** Archivo del sistema operativo. No tocar.
- **Archivo (A):** Indica que ha sido modificado desde la última copia de seguridad.

Para ver los atributos: clic derecho → Propiedades.

**Búsqueda avanzada**

En la barra de búsqueda del Explorador puedes usar filtros:
- `*.pdf` → Todos los archivos PDF
- `nombre:informe` → Archivos que se llamen «informe»
- `tamaño:>10MB` → Archivos de más de 10 MB
- `fechamodificación:esta semana` → Archivos modificados esta semana

### Ejercicios prácticos

   ├── Documentos/

   └── Copias de seguridad/
   ```
2. Mueve algunos archivos a cada carpeta.
3. Activa la visualización de extensiones de archivo si no está activada.

**Ejercicio 1.2 — Búsqueda avanzada**

# Sesión 2 — Ju 28/05
## Gestión de archivos en Linux

### Parte teórica

En Linux, todo se gestiona (también) desde la **terminal**. Aunque hay gestores de archivos gráficos (como Nautilus en Ubuntu), la terminal es más potente y es lo que diferencia a un técnico.

**Comandos esenciales**

| Comando | Qué hace | Ejemplo |
|---------|---------|---------|
| `ls` | Lista archivos | `ls -la` (lista detallada, incluye ocultos) |
| `cd` | Cambia de directorio | `cd /home/usuario/Documentos` |
| `pwd` | Muestra el directorio actual | `pwd` → `/home/usuario` |
| `cp` | Copia archivos | `cp archivo.txt /tmp/copia.txt` |
| `mv` | Mueve o renombra | `mv viejo.txt nuevo.txt` |
| `rm` | Borra archivos | `rm archivo.txt` |
| `rm -r` | Borra carpetas (recursivo) | `rm -r carpeta/` |
| `mkdir` | Crea carpeta | `mkdir NuevaCarpeta` |
| `touch` | Crea archivo vacío | `touch nuevo.txt` |
| `cat` | Muestra contenido de un archivo | `cat archivo.txt` |
| `find` | Busca archivos | `find /home -name "*.pdf"` |
| `chmod` | Cambia permisos | `chmod 755 script.sh` |

**Rutas en Linux**

En Linux no hay letras de unidad (C:, D:). Todo cuelga de la **raíz** `/`:
```
/
├── home/       ← Carpetas personales de cada usuario
│   └── juan/
├── etc/        ← Archivos de configuración del sistema
├── var/        ← Archivos variables (logs, bases de datos)
├── tmp/        ← Archivos temporales
├── usr/        ← Programas instalados
└── root/       ← Carpeta personal del superusuario
```

**Compresión**

| Comando | Qué hace |
|---------|---------|
| `zip archivo.zip archivos…` | Comprime en formato ZIP |
| `unzip archivo.zip` | Descomprime ZIP |
| `tar -czf archivo.tar.gz carpeta/` | Comprime con tar+gzip |
| `tar -xzf archivo.tar.gz` | Descomprime tar.gz |

### Ejercicios prácticos

**Ejercicio 2.1 — Práctica con terminal**
Abre la terminal y ejecuta en orden:
1. `cd ~` (ir a tu carpeta personal)
2. `mkdir Ejercicios`
3. `cd Ejercicios`
4. `touch archivo1.txt archivo2.txt archivo3.txt`
5. `ls` → ¿Qué ves?
6. `echo "Hola mundo" > archivo1.txt`
7. `cat archivo1.txt` → ¿Qué muestra?
8. `cp archivo1.txt copia.txt`
9. `mv copia.txt archivo4.txt`
10. `rm archivo3.txt`
11. `ls` → ¿Qué archivos quedan?

**Ejercicio 2.2 — Compresión**
1. Comprime la carpeta Ejercicios: `tar -czf ejercicios.tar.gz Ejercicios/`
2. ¿Cuánto ocupa el archivo comprimido? (`ls -lh ejercicios.tar.gz`)
3. Crea otra carpeta y descomprime ahí: `mkdir Destino && tar -xzf ejercicios.tar.gz -C Destino/`
4. Verifica que los archivos están en `Destino/Ejercicios/`.

**Estructura de directorios en Windows**

```
C:\
├── Windows\          ← Archivos del sistema operativo
├── Program Files\    ← Programas instalados (64 bits)
├── Program Files (x86)\ ← Programas instalados (32 bits)
├── Users\            ← Carpetas de usuarios
│   ├── Juan\
│   │   ├── Desktop\       (Escritorio)
│   │   ├── Documents\     (Documentos)
│   │   ├── Downloads\     (Descargas)
│   │   └── AppData\       (Datos de aplicaciones - oculta)
│   └── Public\       ← Carpeta compartida
└── ProgramData\      ← Datos de programas (oculta)
```

**Estructura de directorios en Linux** (ya la vimos, pero ampliamos)

| Directorio | Contenido |
|-----------|-----------|
| `/` | Raíz. Todo cuelga de aquí. |
| `/home/usuario` | Tu carpeta personal (equivalente a C:\Users\Juan). |
| `/etc` | Configuración del sistema. |
| `/var/log` | Registros del sistema (logs). |
| `/usr/bin` | Programas de usuario. |
| `/tmp` | Temporales (se borran al reiniciar). |
| `/media` | Donde se montan los pendrives y discos externos. |

**Montar unidades en Linux**

En Linux, conectar un disco externo no le asigna una letra (D:, E:). En su lugar, se **monta** en una carpeta:

```bash
# Ver discos conectados
lsblk

# Montar manualmente un pendrive
sudo mount /dev/sdb1 /media/pendrive

# Desmontar
sudo umount /media/pendrive
```

> 💡 Ubuntu monta automáticamente los pendrives en `/media/tu_usuario/nombre_del_pendrive`.

# Sesión 4 — Lu 01/06
## Permisos, cuotas y cifrado

### Parte teórica

**Permisos en Windows (NTFS)**

Cada archivo y carpeta en NTFS tiene permisos que controlan quién puede hacer qué:

| Permiso | Qué permite |
|---------|------------|
| **Lectura** | Ver el contenido |
| **Escritura** | Modificar el contenido |
| **Ejecución** | Ejecutar el archivo (si es un programa) |
| **Control total** | Todo lo anterior + cambiar permisos y borrar |

Para ver/cambiar permisos: clic derecho → Propiedades → Seguridad.

**Permisos en Linux**

Linux usa un sistema de tres bloques: **usuario dueño**, **grupo** y **otros**.

```
-rwxr-xr--  1 juan usuarios  4096 jun  1 10:00 script.sh
 │││ │││ │││
 │││ │││ └── Otros: r-- (solo lectura)
 │││ └──── Grupo: r-x (lectura y ejecución)
 └────── Usuario: rwx (lectura, escritura, ejecución)
```

| Letra | Significado | Valor numérico |
|-------|-----------|----------------|
| `r` | Read (lectura) | 4 |
| `w` | Write (escritura) | 2 |
| `x` | Execute (ejecución) | 1 |

Ejemplo: `chmod 755 archivo` → usuario: rwx (7), grupo: r-x (5), otros: r-x (5).

**Cuotas de disco**

Las cuotas limitan cuánto espacio puede usar cada usuario. Útil en entornos con varios usuarios (aulas, oficinas).

En Windows: Propiedades del disco → Cuota → Habilitar administración de cuota.

**Cifrado básico**

| Herramienta | SO | Qué cifra |
|------------|-----|-----------|
| **BitLocker** | Windows Pro/Enterprise | Unidades completas (disco C:, pendrive…) |
| **LUKS** | Linux | Particiones completas |
| **EFS** | Windows | Archivos/carpetas individuales |

> 💡 **BitLocker** cifra todo el disco. Si alguien roba tu portátil, no puede leer tus datos sin la contraseña/clave de recuperación.

### Ejercicios prácticos

**Ejercicio 4.1 — Permisos NTFS**
1. Crea una carpeta `C:\Compartida`.
2. Clic derecho → Propiedades → Seguridad → Editar.
3. Añade un usuario y dale solo permiso de lectura.
4. Inicia sesión con ese usuario e intenta crear un archivo dentro. ¿Qué pasa?

**Ejercicio 4.2 — Permisos Linux**
1. Crea un archivo: `touch secreto.txt`
2. Mira sus permisos: `ls -l secreto.txt`
3. Quita todos los permisos a «otros»: `chmod o-rwx secreto.txt`
4. Verifica: `ls -l secreto.txt`
5. Haz el archivo ejecutable para el dueño: `chmod u+x secreto.txt`

**Ejercicio 4.3 — Cifrar con BitLocker**
Si hay un pendrive disponible:
1. Insértalo → clic derecho → «Activar BitLocker».
2. Elige una contraseña.
3. Guarda la clave de recuperación.
4. Cifra el pendrive.
5. Extráelo y vuelve a insertarlo. ¿Qué pide?

# Sesión 7 — Vi 05/06
## Pantalla, energía y red

### Parte teórica

**Configuración de pantalla**

En Configuración → Pantalla puedes ajustar:
- **Resolución:** Usa siempre la resolución nativa (recomendada).
- **Escala:** Aumenta el tamaño de texto e iconos (100%, 125%, 150%…). Útil en pantallas de alta resolución.
- **Orientación:** Horizontal (normal), vertical (para monitores girados), invertida.
- **Múltiples pantallas:** Extender, duplicar, solo primera, solo segunda.

**Planes de energía**

Windows tiene planes que equilibran rendimiento y consumo:

| Plan | Comportamiento |
|------|---------------|
| **Equilibrado** | Rendimiento cuando lo necesitas, ahorro cuando no. Recomendado. |
| **Alto rendimiento** | Máxima potencia siempre. Mayor consumo. |
| **Economizador** | Máximo ahorro. Menor rendimiento. Para portátiles con batería. |

Configuración → Sistema → Energía y batería.

**Configuración de red básica (IP y DNS)**

| Concepto | Qué es | Ejemplo |
|----------|--------|---------|
| **Dirección IP** | La «dirección postal» de tu PC en la red | 192.168.1.100 |
| **Máscara de subred** | Define el tamaño de tu red local | 255.255.255.0 |
| **Puerta de enlace** | La dirección del router (la salida a internet) | 192.168.1.1 |
| **DNS** | Traduce nombres (google.com) a IPs (142.250.185.14) | 8.8.8.8 (Google DNS) |

Normalmente estos datos se asignan automáticamente (**DHCP**). Pero a veces necesitas configurarlos manualmente (**IP estática**):

Configuración → Red → Propiedades del adaptador → Editar → Manual → IPv4.

| **Administrador** | Control total: instalar programas, cambiar configuración, gestionar otros usuarios | Solo para administración. No usar como cuenta diaria. |
| **Estándar** | Usar programas, modificar sus propios archivos. No puede instalar para todos los usuarios ni cambiar configuración del sistema. | Uso diario recomendado. |
| **Invitado** | Acceso muy limitado. No guarda configuración. | Acceso temporal. |

**Crear un usuario en Windows:**
1. Configuración → Cuentas → Otros usuarios → Agregar cuenta.
2. Elige «No tengo la información de inicio de sesión» → «Agregar un usuario sin cuenta Microsoft».
3. Introduce nombre y contraseña.
4. Para hacerlo administrador: selecciónalo → Cambiar tipo de cuenta → Administrador.

**Grupos**

Los grupos facilitan gestionar permisos para varios usuarios a la vez:
- **Administradores:** Control total.
- **Usuarios:** Permisos estándar.
- **Invitados:** Permisos mínimos.

Puedes crear grupos personalizados para asignar permisos específicos a carpetas o recursos.

**Directivas de contraseña**

En Windows Pro puedes configurar directivas de seguridad:
- `secpol.msc` → Directivas de cuenta → Directiva de contraseñas.
- Longitud mínima, complejidad, vigencia máxima, historial.

# Sesión 9 — Ma 09/06
## Mantenimiento del sistema

### Parte teórica

**Herramientas de mantenimiento en Windows**

| Herramienta | Qué hace | Cómo acceder |
|------------|---------|-------------|
| **Liberador de espacio en disco** | Elimina archivos temporales, caché, papelera | Buscar «Liberador de espacio» |
| **Optimizar unidades** | Desfragmenta HDD / optimiza SSD (TRIM) | Buscar «Optimizar unidades» |
| **Programador de tareas** | Ejecuta programas o scripts automáticamente en horarios definidos | `taskschd.msc` |

**¿Qué es la desfragmentación?**

En un HDD, los archivos se guardan «troceados» por todo el disco. Con el tiempo, leer un archivo implica que el cabezal salte de un lado a otro. Desfragmentar reorganiza los archivos para que estén contiguos → lectura más rápida.

> ⚠️ **Nunca desfragmentes un SSD.** No lo necesita (no tiene cabezal) y acorta su vida útil. Windows lo sabe y en SSD ejecuta TRIM en su lugar (que sí es beneficioso).

**Programador de tareas**

Permite automatizar acciones. Ejemplo: hacer una copia de seguridad todos los viernes a las 22:00.

1. Abre `taskschd.msc`.
2. «Crear tarea básica».
3. Ponle nombre → Elige desencadenador (semanal, diario…) → Elige acción (ejecutar programa).
4. Configura los detalles y finaliza.

# Sesión 10 — Mi 10/06
## Copias de seguridad y restauración

### Parte teórica

**Puntos de restauración del sistema**

Un punto de restauración es una «foto» del estado del sistema en un momento dado. Si algo sale mal (instalas un driver malo, un programa rompe algo), puedes volver atrás.

- **Crear:** Panel de control → Sistema → Protección del sistema → Crear.
- **Restaurar:** Mismo sitio → Restaurar sistema → Elige un punto.

> 💡 Los puntos de restauración solo afectan al sistema y programas, **no a tus archivos personales**.

**Historial de archivos**

Guarda copias automáticas de tus archivos personales en una unidad externa:
- Configuración → Sistema → Almacenamiento → Opciones avanzadas → Historial de archivos.
- Conecta un disco externo.
- Actívalo y elige la frecuencia (cada hora, cada día…).

Si borras un archivo sin querer, puedes recuperar una versión anterior.

**Copia de seguridad completa (imagen del sistema)**

Es como la clonación que hicimos con Clonezilla, pero integrada en Windows:
- Panel de control → Copia de seguridad y restauración (Windows 7) → Crear una imagen del sistema.
- Guárdala en un disco externo.
- Para restaurar: arranca desde el USB de instalación de Windows → «Reparar el equipo» → «Recuperación de imagen».
