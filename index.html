# Sesión 11 — Ju 11/06
## Gestión de procesos y recursos

### Parte teórica

**El Administrador de tareas (en profundidad)**

Ábrelo con **Ctrl+Shift+Esc**. Tiene varias pestañas:

| Pestaña | Qué muestra |
|---------|------------|
| **Procesos** | Todos los programas y servicios en ejecución, con su consumo de CPU, RAM, disco y red |
| **Rendimiento** | Gráficos en tiempo real de CPU, RAM, disco, red y GPU |
| **Inicio** | Programas que arrancan con Windows (puedes deshabilitar los innecesarios) |
| **Detalles** | Lista técnica de todos los procesos con PID, estado, usuario… |
| **Servicios** | Los servicios del sistema (equivalente a `services.msc`) |

**¿Qué son los servicios?**

Los servicios son programas que se ejecutan en segundo plano, sin interfaz gráfica. Ejemplos:
- **Windows Update:** Descarga actualizaciones.
- **Spooler (cola de impresión):** Gestiona los trabajos de impresión.
- **DHCP Client:** Obtiene la IP automática del router.

Para gestionar servicios: `services.msc` o pestaña Servicios del Administrador de tareas.

**Gestión de procesos en Linux**

| Comando | Qué hace |
|---------|---------|
| `ps aux` | Lista todos los procesos |
| `top` | Monitor de procesos en tiempo real (como el Administrador de tareas) |
| `htop` | Versión mejorada de top (instalar con `sudo apt install htop`) |
| `kill PID` | Termina un proceso por su ID |
| `kill -9 PID` | Fuerza la terminación (cuando no responde) |
| `systemctl status servicio` | Ver estado de un servicio |
| `systemctl stop servicio` | Parar un servicio |
| `systemctl start servicio` | Arrancar un servicio |

### Ejercicios prácticos

**Ejercicio 11.1 — Monitorizar procesos**
1. Abre el Administrador de tareas → Procesos.

5. Deshabilita los que no sean necesarios (pregunta al profesor si tienes dudas).

**Ejercicio 11.2 — Detener servicios innecesarios**

2. Busca el servicio «Cola de impresión» (Print Spooler).
3. Detenlo (clic derecho → Detener).

5. Vuelve a iniciarlo.

**Ejercicio 11.3 — Procesos en Linux**

3. Pulsa `q` para salir.
4. Instala htop: `sudo apt install htop` y ejecútalo. ¿Qué mejoras ves respecto a `top`?
5. Abre Firefox y busca su proceso con `ps aux | grep firefox`. Anota su PID: ___

// Markdown parser
function md(src) {
    var html = '';
    var lines = src.split('\n');
    var i = 0;
    while (i < lines.length) {
        var line = lines[i];
        // Code block
        if (line.trim().indexOf('```') === 0) {
            var code = '';
            i++;
            while (i < lines.length && lines[i].trim().indexOf('```') !== 0) {
                code += esc(lines[i]) + '\n';
                i++;
            }
            html += '<pre><code>' + code.trimEnd() + '</code></pre>\n';
            i++; continue;
        }
        // Heading
        var hm = line.match(/^(#{1,4})\s+(.+)/);
        if (hm) {
            var lvl = hm[1].length;
            var text = inl(hm[2]);
            var id = slug(hm[2]);
            html += '<h' + lvl + ' id="' + id + '">' + text + '</h' + lvl + '>\n';
            i++; continue;
        }
        // HR
        if (/^---+\s*$/.test(line.trim())) { html += '<hr>\n'; i++; continue; }
        // Blockquote
        if (line.trim().charAt(0) === '>') {
            var bq = '';
            while (i < lines.length && lines[i].trim().charAt(0) === '>') {
                bq += lines[i].replace(/^>\s?/, '') + '\n';
                i++;
            }
            html += '<blockquote>' + bq.split('\n').filter(function(l){return l.trim()}).map(function(l){return '<p>'+inl(l)+'</p>'}).join('') + '</blockquote>\n';
            continue;
        }
        // Table
        if (line.indexOf('|') !== -1 && i+1 < lines.length && /\|[\s-:]+\|/.test(lines[i+1])) {
            var hcells = line.replace(/^\|/, '').replace(/\|$/, '').split('|');
            html += '<table><tr>' + hcells.map(function(c){return '<th>'+inl(c.trim())+'</th>'}).join('') + '</tr>\n';
            i += 2;
            while (i < lines.length && lines[i].indexOf('|') !== -1 && lines[i].trim() !== '') {
                var cells = lines[i].replace(/^\|/, '').replace(/\|$/, '').split('|');
                html += '<tr>' + cells.map(function(c){return '<td>'+inl(c.trim())+'</td>'}).join('') + '</tr>\n';
                i++;
            }
            html += '</table>\n'; continue;
        }
        // Unordered list
        if (/^\s*[-*]\s+/.test(line)) {
            html += '<ul>\n';
            while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) {
                html += '<li>' + inl(lines[i].replace(/^\s*[-*]\s+/, '')) + '</li>\n';
                i++;
            }
            html += '</ul>\n'; continue;
        }
        // Ordered list
        if (/^\s*\d+\.\s+/.test(line)) {
            html += '<ol>\n';
            while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
                html += '<li>' + inl(lines[i].replace(/^\s*\d+\.\s+/, '')) + '</li>\n';
                i++;
            }
            html += '</ol>\n'; continue;
        }
        // Empty
        if (line.trim() === '') { i++; continue; }
        // Paragraph
        var para = line;
        i++;
        while (i < lines.length && lines[i].trim() !== '' && !lines[i].match(/^#{1,4}\s/) && lines[i].trim().charAt(0) !== '>' && !/^---/.test(lines[i].trim()) && lines[i].trim().indexOf('```') !== 0 && !/^\s*[-*]\s+/.test(lines[i]) && !/^\s*\d+\.\s+/.test(lines[i]) && !(lines[i].indexOf('|') !== -1 && i+1 < lines.length && /\|[\s-:]+\|/.test(lines[i+1]||''))) {
            para += ' ' + lines[i];
            i++;
        }
        html += '<p>' + inl(para) + '</p>\n';
    }
    return html;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function inl(s){
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    return s;
}
function slug(t){return t.toLowerCase().replace(/\*\*/g,'').replace(/[^a-z0-9\u00e0-\u00ff]+/g,'-').replace(/^-|-$/g,'')}
